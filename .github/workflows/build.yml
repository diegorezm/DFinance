name: Android Release

on:
  push:
    tags:
      - "v*"

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  build-android:
    name: Build Android APK and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gradle setup (cache, permissions, etc)
        uses: ./.github/actions/gradle-setup

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Android RELEASE APK
        run: ./gradlew :composeApp:assembleRelease

      - name: Verify APK path
        run: find composeApp/build/outputs -name "*.apk"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: DFinance ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: composeApp/build/outputs/apk/release/composeApp-release.apk
          asset_name: DFinance.apk
          asset_content_type: application/vnd.android.package-archive